<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Converter | Pursuit Assessment</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      /* Custom styles to prevent layout shift when numbers change */
      .output-container {
        min-height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <button
      id="themeToggle"
      class="btn btn-outline-secondary position-absolute top-0 end-0 m-3"
    >
      Toggle Theme
    </button>

    <div
      class="container d-flex vh-100 justify-content-center align-items-center"
    >
      <div class="card shadow-lg p-4" style="width: 100%; max-width: 450px">
        <div class="card-body">
          <h3 class="card-title text-center mb-4">Unit Converter</h3>

          <div class="mb-3">
            <label for="inputValue" class="form-label">Distance</label>
            <input
              type="number"
              class="form-control form-control-lg"
              id="inputValue"
              placeholder="Enter a number..."
              step="any"
            />
          </div>

          <div class="mb-4">
            <label for="conversionDirection" class="form-label"
              >Direction</label
            >
            <select class="form-select form-select-lg" id="conversionDirection">
              <option value="kmToMi">Kilometers → Miles</option>
              <option value="miToKm">Miles → Kilometers</option>
            </select>
          </div>

          <hr />

          <div class="output-container">
            <h2 id="resultOutput" class="text-center text-primary m-0 fw-bold">
              0.00
            </h2>
          </div>
          <p id="unitLabel" class="text-center text-muted mb-0 mt-2">Miles</p>
        </div>
      </div>
    </div>

    <script>
      // --- 0. Localization (l10n) ---
      const LOCALIZED_SPELLINGS = {
        US: "Kilometers",
        INTL: "Kilometres",
      }

      const getKmSpelling = () => {
        // Detects US English explicitly; falls back to international for all others
        const lang = navigator.language
        return lang === "en-US" || lang.startsWith("en-US-")
          ? LOCALIZED_SPELLINGS.US
          : LOCALIZED_SPELLINGS.INTL
      }

      const kmText = getKmSpelling()

      // --- 1. Pure Calculation Logic (Decoupled) ---
      const CONVERSION_RATES = {
        kmToMi: 0.62137119,
        miToKm: 1.609344,
      }

      const calculateConversion = (value, direction) => {
        if (Number.isNaN(value)) return 0
        const rate =
          direction === "kmToMi"
            ? CONVERSION_RATES.kmToMi
            : CONVERSION_RATES.miToKm
        return value * rate
      }

      // --- 2. DOM Elements ---
      const themeToggleBtn = document.getElementById("themeToggle")
      const htmlElement = document.documentElement
      const inputField = document.getElementById("inputValue")
      const directionSelect = document.getElementById("conversionDirection")
      const outputDisplay = document.getElementById("resultOutput")
      const unitLabel = document.getElementById("unitLabel")

      // --- 3. UI Update Handlers ---
      const handleCalculate = () => {
        const rawValue = parseFloat(inputField.value)
        const direction = directionSelect.value

        // Handle empty or invalid input
        if (inputField.value.trim() === "" || Number.isNaN(rawValue)) {
          outputDisplay.textContent = "0.00"
          return
        }

        const result = calculateConversion(rawValue, direction)

        // Format to 4 decimal places for precision, stripping trailing zeros
        outputDisplay.textContent = parseFloat(result.toFixed(4)).toString()

        // Update the helper text below the number with the localized spelling
        unitLabel.textContent = direction === "kmToMi" ? "Miles" : kmText
      }

      const handleThemeToggle = () => {
        const currentTheme = htmlElement.getAttribute("data-bs-theme")
        const newTheme = currentTheme === "dark" ? "light" : "dark"
        htmlElement.setAttribute("data-bs-theme", newTheme)
      }

      // --- 4. Initialization & Event Listeners ---
      const initLocalization = () => {
        directionSelect.options[0].textContent = `${kmText} → Miles`
        directionSelect.options[1].textContent = `Miles → ${kmText}`
      }

      inputField.addEventListener("input", handleCalculate)
      directionSelect.addEventListener("change", handleCalculate)
      themeToggleBtn.addEventListener("click", handleThemeToggle)

      // Initialize the dynamic text on load
      initLocalization()
    </script>
  </body>
</html>
